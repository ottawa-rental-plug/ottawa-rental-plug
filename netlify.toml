# Netlify Configuration for ORP Platform with Form 410 Serverless Backend

[build]
  # Build command (CSS generation)
  command = "npm run build:css"
  # Output directory
  publish = "."
  # Functions directory for serverless functions
  functions = "netlify/functions"

# Redirect all /api requests to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Cache rules
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Functions configuration
[functions]
  node_bundler = "esbuild"
  memory = 1024
  timeout = 30

# Development settings
[dev]
  port = 3000
  publish = "."
  functions = "netlify/functions"
  autoLaunch = false

# Redirects for SPA routing
[[redirects]]
  from = "/rental-application"
  to = "/rental-application.html"
  status = 200

[[redirects]]
  from = "/apply"
  to = "/apply.html"
  status = 200
